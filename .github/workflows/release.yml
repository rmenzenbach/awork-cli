name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.new_tag }}
      version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and create tag
        id: bump
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

  build:
    needs: version
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            artifact: awork-linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish src/Awk.Cli -c Release -r ${{ matrix.rid }} -o publish

      - name: Package (Unix)
        run: tar -czvf ${{ matrix.artifact }}.tar.gz -C publish .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: [version, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: artifacts/*
          generate_release_notes: true

  homebrew:
    needs: [version, release]
    runs-on: ubuntu-latest

    steps:
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          set -e

          # Download the only published release asset and compute SHA256
          curl -sL "https://github.com/awork-io/awork-cli/releases/download/${TAG}/awork-linux-arm64.tar.gz" -o linux-arm64.tar.gz
          SHA_LINUX_ARM64=$(sha256sum linux-arm64.tar.gz | cut -d' ' -f1)

          # Clone homebrew-awork-cli
          git clone "https://x-access-token:${GH_TOKEN}@github.com/awork-io/homebrew-awork-cli.git" tap
          cd tap

          # Update formula
          cat > Formula/awork-cli.rb << EOF
          class AworkCli < Formula
            desc "Token-only, swagger-driven CLI for awork"
            homepage "https://github.com/awork-io/awork-cli"
            version "${VERSION}"
            license "MIT"

            on_linux do
              url "https://github.com/awork-io/awork-cli/releases/download/${TAG}/awork-linux-arm64.tar.gz"
              sha256 "${SHA_LINUX_ARM64}"
            end

            def install
              bin.install "awork"
            end

            test do
              assert_match "USAGE", shell_output("#{bin}/awork --help")
            end
          end
          EOF

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/awork-cli.rb
          git commit -m "awork ${VERSION}"
          git push
